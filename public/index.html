<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>csvagent · le mie spese</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300..700&family=Inter+Tight:wght@300..700&family=Plus+Jakarta+Sans:wght@300..700&family=Manrope:wght@300..700&family=Instrument+Serif&family=Fraunces:opsz,wght@9..144,400;9..144,500&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    /* Palette: warm-cream (default) */
    --bg: #F5F1E8;
    --surface: #FFFFFF;
    --surface-2: #EFE9DC;
    --border: #E2DAC8;
    --border-strong: #C9BFA8;
    --text: #1F1C16;
    --text-soft: #4A463C;
    --muted: #847E6F;
    --accent: #2F5D52;
    --accent-soft: #D9E4DC;
    --accent-ink: #1B3A33;
    --warn: #B05A3C;
    --warn-soft: #F1DFD3;
    --positive: #5A8A6F;

    --c1: #2F5D52;
    --c2: #B05A3C;
    --c3: #C49A3F;
    --c4: #6B83A8;
    --c5: #8A6B9E;
    --c6: #A45D6E;

    --serif: 'Instrument Serif', 'Iowan Old Style', Georgia, serif;
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;

    --radius: 14px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 2px rgba(31, 28, 22, 0.04);
    --shadow: 0 1px 3px rgba(31, 28, 22, 0.05), 0 8px 24px -12px rgba(31, 28, 22, 0.08);
    --pad: 1.5rem;
  }

  body[data-ui-font="inter"]   { --sans: 'Inter Tight', -apple-system, sans-serif; }
  body[data-ui-font="jakarta"] { --sans: 'Plus Jakarta Sans', -apple-system, sans-serif; }
  body[data-ui-font="manrope"] { --sans: 'Manrope', -apple-system, sans-serif; }

  body[data-accent-font="fraunces"] { --serif: 'Fraunces', Georgia, serif; }
  body[data-accent-font="dm-serif"] { --serif: 'DM Serif Display', Georgia, serif; }

  /* Palette: cool-slate */
  body[data-palette="slate"] {
    --bg: #F4F5F7;
    --surface: #FFFFFF;
    --surface-2: #ECEEF2;
    --border: #DEE2E8;
    --border-strong: #C0C7D2;
    --text: #15181D;
    --text-soft: #3D424B;
    --muted: #6E7682;
    --accent: #2A4F7A;
    --accent-soft: #DCE5F1;
    --accent-ink: #1A3656;
    --warn: #B0533C;
    --warn-soft: #F1DDD3;
    --positive: #5A8A6F;
    --c1: #2A4F7A; --c2: #B0533C; --c3: #C49A3F; --c4: #5C8071; --c5: #8A6B9E; --c6: #A45D6E;
  }

  /* Palette: forest */
  body[data-palette="forest"] {
    --bg: #F4F5F4;
    --surface: #FFFFFF;
    --surface-2: #ECEEEC;
    --border: #DEE2DD;
    --border-strong: #BFC7BD;
    --text: #14181A;
    --text-soft: #3C4341;
    --muted: #6C7570;
    --accent: #1F5A45;
    --accent-soft: #DAE8E1;
    --accent-ink: #143C2D;
    --warn: #B0533C;
    --warn-soft: #F1DDD3;
    --positive: #5A8A6F;
    --c1: #1F5A45; --c2: #B0533C; --c3: #C49A3F; --c4: #6B83A8; --c5: #8A6B9E; --c6: #A45D6E;
  }

  /* Density: compact */
  body[data-density="compact"] {
    --pad: 1rem;
    --radius: 10px;
    font-size: 13px;
  }
  body[data-density="compact"] header { padding: 0.75rem 1.25rem; }
  body[data-density="compact"] .sidebar { padding: 0.85rem 0.75rem 0.85rem 1rem; gap: 1rem; }
  body[data-density="compact"] .schema-card { padding: 0.7rem 0.8rem; }
  body[data-density="compact"] .schema-card .hero .num { font-size: 1.5rem; }
  body[data-density="compact"] .schema-card .row { padding: 0.25rem 0; font-size: 0.72rem; }
  body[data-density="compact"] .suggestions { gap: 0.25rem; }
  body[data-density="compact"] .suggestion-btn { padding: 0.4rem 0.6rem; font-size: 0.74rem; }
  body[data-density="compact"] .ask-bar { padding: 0.6rem 1.25rem; }
  body[data-density="compact"] .ask-shell { padding: 0.4rem 0.5rem 0.45rem 0.75rem; row-gap: 0.35rem; }
  body[data-density="compact"] .ask-shell textarea { font-size: 0.85rem; padding: 0.35rem 0.2rem 0.25rem; min-height: 26px; }
  body[data-density="compact"] .ctrl { height: 28px; padding: 0.25rem 0.45rem; font-size: 0.7rem; }
  body[data-density="compact"] .ask-btn { height: 32px; padding: 0 0.85rem; font-size: 0.78rem; }
  body[data-density="compact"] .new-btn { height: 32px; padding: 0 0.65rem; font-size: 0.72rem; }
  body[data-density="compact"] .results { padding: 0.85rem 1.25rem 2rem; gap: 0.75rem; }
  body[data-density="compact"] .response-body { padding: 0.9rem 1rem 0.85rem; gap: 0.85rem; }
  body[data-density="compact"] .question-row { padding: 0.55rem 1rem; }
  body[data-density="compact"] .summary-text { font-size: 1.2rem; line-height: 1.25; }
  body[data-density="compact"] .insights-list { gap: 0.3rem; }
  body[data-density="compact"] .insights-list li { font-size: 0.82rem; padding: 0.45rem 0.7rem 0.45rem 1.9rem; }
  body[data-density="compact"] .insights-list li::before { left: 0.7rem; width: 12px; height: 12px; }
  body[data-density="compact"] .chart-wrap { padding: 0.7rem 0.8rem 0.55rem; }
  body[data-density="compact"] .chart-wrap canvas { max-height: 240px; }
  body[data-density="compact"] .empty-state { gap: 0.6rem; padding: 1.5rem 1rem; }
  body[data-density="compact"] .empty-state .figure { font-size: 3rem; }
  body[data-density="compact"] .empty-state h3 { font-size: 1.25rem; }
  body[data-density="compact"] .empty-state p { font-size: 0.82rem; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  .brand-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .hamburger {
    display: inline-flex;
    width: 36px;
    height: 36px;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    color: var(--text);
    padding: 0;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .hamburger:hover { border-color: var(--accent); color: var(--accent); }
  .hamburger svg { width: 18px; height: 18px; }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .repo-link {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.4rem 0.55rem;
    border-radius: 8px;
    transition: all 0.15s;
  }
  .repo-link:hover { color: var(--text); background: var(--surface-2); }
  .repo-link svg { width: 16px; height: 16px; flex-shrink: 0; }
  .repo-link .ver {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--surface-2);
    padding: 0.1rem 0.4rem;
    border-radius: 999px;
    margin-left: auto;
  }
  .repo-link:hover .ver { background: var(--surface); }

  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20, 20, 20, 0.35);
    backdrop-filter: blur(2px);
    z-index: 50;
    animation: fadeIn 0.2s ease;
  }
  body.drawer-open .sidebar-backdrop { display: block; }

  /* Header */
  header {
    padding: 1.1rem 1.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 0.65rem;
  }

  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--accent);
    display: grid;
    place-items: center;
    color: var(--surface);
    align-self: center;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.12);
    flex-shrink: 0;
  }
  .brand-mark svg { width: 16px; height: 16px; display: block; }

  .brand h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 1.55rem;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  body[data-brand="wordmark"] .brand h1 {
    font-family: var(--sans);
    font-style: normal;
    font-weight: 700;
    letter-spacing: -0.03em;
    font-size: 1.2rem;
  }

  .brand .tag {
    font-family: var(--sans);
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    padding: 0.15rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .header-meta .pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.3rem 0.65rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-soft);
    font-weight: 500;
  }

  .header-meta .pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--positive);
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100%;
    overflow: hidden;
    transition: grid-template-columns 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  body.sidebar-collapsed .layout { grid-template-columns: 0 1fr; }
  body.sidebar-collapsed .sidebar { transform: translateX(-100%); border-right: none; }
  .sidebar { transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1); }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.25rem 1rem 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    overflow-y: auto;
    background: var(--bg);
  }

  .side-section h2 {
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.7rem;
  }

  .schema-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    box-shadow: var(--shadow-sm);
  }

  .schema-card .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.4rem 0;
    border-bottom: 1px dashed var(--border);
    font-size: 0.78rem;
  }
  .schema-card .row:last-child { border-bottom: none; }
  .schema-card .row .k { color: var(--muted); }
  .schema-card .row .v {
    color: var(--text);
    font-weight: 500;
    text-align: right;
    max-width: 190px;
    word-break: break-word;
  }

  .schema-card .hero {
    text-align: left;
    padding-bottom: 0.5rem;
    margin-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .schema-card .hero .num {
    font-family: var(--serif);
    font-size: 2rem;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .schema-card .hero .lbl {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.25rem;
    letter-spacing: 0.04em;
  }

  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .suggestion-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-soft);
    padding: 0.6rem 0.8rem;
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    line-height: 1.35;
    border-radius: var(--radius-sm);
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .suggestion-btn::before {
    content: '';
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--border-strong);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .suggestion-btn:hover {
    border-color: var(--accent);
    color: var(--accent-ink);
    background: var(--accent-soft);
  }
  .suggestion-btn:hover::before { background: var(--accent); }

  /* Main */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .ask-bar {
    padding: 1rem 1.75rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .ask-shell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.55rem 0.65rem 0.6rem 1rem;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    column-gap: 0.6rem;
    row-gap: 0.5rem;
    align-items: center;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .ask-shell textarea { grid-column: 1 / -1; }
  .ask-shell .ctrl-row { grid-column: 1; justify-self: start; }
  .ask-shell .ask-actions { grid-column: 2; display: flex; align-items: center; gap: 0.4rem; justify-self: end; }
  .ask-shell:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  .ask-shell textarea {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.95rem;
    padding: 0.55rem 0.25rem 0.4rem;
    resize: none;
    min-height: 32px;
    line-height: 1.4;
    outline: none;
    width: 100%;
    min-width: 0;
  }
  .ask-shell textarea::placeholder { color: var(--muted); }

  .ctrl {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-soft);
    font-family: var(--sans);
    font-size: 0.74rem;
    font-weight: 500;
    padding: 0.4rem 0.6rem;
    border-radius: 8px;
    outline: none;
    cursor: pointer;
    transition: all 0.15s;
    height: 32px;
  }
  .ctrl:hover { border-color: var(--border-strong); }
  .ctrl:focus { border-color: var(--accent); }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .ask-btn {
    background: var(--accent);
    color: var(--surface);
    border: none;
    padding: 0 1.1rem;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    height: 40px;
    border-radius: 9px;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    transition: background 0.15s, transform 0.1s;
  }
  .ask-btn:hover { background: var(--accent-ink); }
  .ask-btn:active { transform: scale(0.98); }
  .ask-btn:disabled { background: var(--border-strong); color: var(--surface); cursor: wait; }

  .new-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--sans);
    font-weight: 500;
    font-size: 0.78rem;
    cursor: pointer;
    height: 40px;
    padding: 0 0.85rem;
    border-radius: 9px;
    transition: all 0.15s;
  }
  .new-btn:hover { color: var(--warn); border-color: var(--warn); background: var(--warn-soft); }

  /* Results */
  .results {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1.75rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 1rem;
    padding: 3rem 1rem;
    color: var(--muted);
    text-align: center;
  }
  .empty-state .figure {
    font-family: var(--serif);
    font-size: 4.5rem;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 0.5rem;
    letter-spacing: -0.04em;
  }
  .empty-state h3 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 1.6rem;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.2;
    max-width: 32ch;
  }
  .empty-state p {
    font-size: 0.9rem;
    max-width: 38ch;
    line-height: 1.55;
  }

  /* Response card */
  .response-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeIn 0.35s cubic-bezier(0.2, 0.7, 0.2, 1);
    box-shadow: var(--shadow-sm);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-row {
    padding: 0.85rem 1.25rem;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
  }
  .question-row .q {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.55rem;
  }
  .question-row .q::before {
    content: '';
    width: 16px; height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--accent-soft) 0%, var(--accent) 70%);
    flex-shrink: 0;
  }
  .question-row .ts {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .response-body {
    padding: 1.5rem 1.5rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
  }
  body[data-density="compact"] .response-body { padding: 1.1rem 1.1rem 1rem; gap: 1.1rem; }

  .summary-text {
    font-family: var(--sans);
    font-weight: 400;
    font-size: 1.55rem;
    line-height: 1.3;
    color: var(--text);
    letter-spacing: -0.012em;
    text-wrap: pretty;
  }
  .summary-text strong, .summary-text b {
    font-style: normal;
    font-weight: 600;
    background: var(--accent-soft);
    color: var(--accent-ink);
    padding: 0 0.25em;
    border-radius: 4px;
    font-size: 0.93em;
  }
  .summary-text ul { list-style: disc; padding-left: 1.4rem; margin: 0.4rem 0; font-size: 1rem; }

  .section-label {
    font-family: var(--sans);
    font-size: 0.66rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.55rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .insights-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .insights-list li {
    font-size: 0.92rem;
    line-height: 1.55;
    padding: 0.6rem 0.85rem 0.6rem 2.2rem;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    position: relative;
    color: var(--text-soft);
  }
  .insights-list li::before {
    content: '';
    position: absolute;
    left: 0.85rem;
    top: 1em;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 2px solid var(--accent);
  }
  .warnings-list li { background: var(--warn-soft); color: #5A2E1E; }
  .warnings-list li::before { background: var(--surface); border-color: var(--warn); }

  /* Chart */
  .chart-wrap {
    background: var(--surface-2);
    border-radius: var(--radius);
    padding: 1rem 1.1rem 0.85rem;
  }
  .chart-wrap .chart-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .chart-wrap canvas { max-height: 320px; }

  .save-png-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 0.7rem;
    cursor: pointer;
    padding: 0.3rem 0.65rem;
    border-radius: 7px;
    transition: all 0.15s;
  }
  .save-png-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Raw data */
  .toggle-raw {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
    text-decoration-color: var(--border-strong);
    text-underline-offset: 4px;
  }
  .toggle-raw:hover { color: var(--text); text-decoration-color: var(--accent); }

  .raw-data {
    background: var(--text);
    color: #E8E2D5;
    border-radius: var(--radius-sm);
    padding: 0.85rem 1rem;
    font-family: var(--mono);
    font-size: 0.74rem;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre;
    margin-top: 0.6rem;
  }

  /* Loading */
  .loading-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 0.85rem;
    box-shadow: var(--shadow-sm);
    animation: fadeIn 0.2s ease;
    font-family: var(--sans);
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.9rem;
    color: var(--text-soft);
    font-family: var(--sans);
  }
  .loading-text .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }

  .error-card {
    background: var(--warn-soft);
    border: 1px solid var(--warn);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    font-size: 0.88rem;
    color: #5A2E1E;
    animation: fadeIn 0.2s ease;
  }

  /* Tweaks panel */
  #tweaks-panel {
    position: fixed;
    bottom: 1.25rem;
    right: 1.25rem;
    width: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.18);
    padding: 1rem;
    z-index: 100;
    font-family: var(--sans);
    display: none;
  }
  #tweaks-panel.open { display: block; }
  #tweaks-panel h4 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 1.1rem;
    margin-bottom: 0.85rem;
    color: var(--text);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #tweaks-panel h4 .x {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; color: var(--muted); padding: 0 0.2rem;
  }
  #tweaks-panel h4 .x:hover { color: var(--text); }

  .tweak-group { margin-bottom: 0.95rem; }
  .tweak-group:last-child { margin-bottom: 0; }
  .tweak-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .tweak-segments {
    display: flex;
    background: var(--surface-2);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .tweak-segments button {
    flex: 1;
    background: transparent;
    border: none;
    padding: 0.4rem 0.5rem;
    font-family: var(--sans);
    font-size: 0.74rem;
    font-weight: 500;
    color: var(--text-soft);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .tweak-segments button.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  .tweak-swatches { display: flex; gap: 6px; }
  .tweak-swatches button {
    flex: 1;
    height: 32px;
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tweak-swatches button.active { border-color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 720px) {
    .ask-shell { grid-template-columns: 1fr; }
    .ask-shell .ctrl-row,
    .ask-shell .ask-actions { grid-column: 1; justify-self: stretch; }
    .ask-shell .ask-actions { justify-content: flex-end; }
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr !important; }
    .header-meta .pill:not(:last-child) { display: none; }
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 280px;
      max-width: 85vw;
      height: 100vh;
      z-index: 60;
      background: var(--bg);
      border-right: 1px solid var(--border);
      transform: translateX(-100%);
      box-shadow: 0 0 40px -10px rgba(0,0,0,0.2);
    }
    body.drawer-open .sidebar { transform: translateX(0); }
    body.sidebar-collapsed:not(.drawer-open) .sidebar { transform: translateX(-100%); }
  }

  @media (max-width: 640px) {
    .ask-shell { padding: 0.5rem 0.5rem 0.55rem 0.7rem; row-gap: 0.45rem; }
    .ask-shell textarea { font-size: 0.9rem; }
    .ctrl-row { gap: 0.35rem; width: 100%; }
    .ctrl-row .ctrl { flex: 1 1 0; min-width: 0; padding: 0.35rem 0.4rem; font-size: 0.72rem; height: 32px; }
    .ask-actions { gap: 0.35rem; width: 100%; }
    .new-btn { flex: 0 0 auto; height: 36px; padding: 0 0.7rem; font-size: 0.74rem; }
    .ask-btn { flex: 1 1 auto; height: 36px; padding: 0 0.9rem; font-size: 0.8rem; justify-content: center; }
    body { overflow: auto; }
    body, html { height: auto; min-height: 100%; }
    header { padding: 0.75rem 1rem; }
    .header-meta { gap: 0.5rem; }
    .header-meta .pill { font-size: 0.7rem; padding: 0.25rem 0.55rem; }
    .brand h1 { font-size: 1.1rem; }
    .brand .tag { display: none; }
    .layout { height: auto; min-height: calc(100vh - 60px); }
    .main { overflow: visible; }
    .ask-bar { padding: 0.6rem 0.85rem; }
    .results { padding: 0.85rem 0.85rem 1.5rem; overflow: visible; gap: 0.85rem; }
    .response-body { padding: 1rem 0.9rem 0.85rem; gap: 1rem; }
    .question-row { padding: 0.6rem 0.85rem; }
    .question-row .q { font-size: 0.78rem; }
    .summary-text { font-size: 1.15rem; line-height: 1.3; }
    .insights-list li { font-size: 0.85rem; padding: 0.5rem 0.7rem 0.5rem 1.7rem; }
    .insights-list li::before { left: 0.6rem; width: 11px; height: 11px; }
    .chart-wrap { padding: 0.7rem 0.6rem 0.55rem; }
    .chart-wrap canvas { max-height: 220px; }
    .empty-state { padding: 2rem 1rem; }
    .empty-state .figure { font-size: 3rem; }
    .empty-state h3 { font-size: 1.2rem; }
    #tweaks-panel { width: auto; left: 0.85rem; right: 0.85rem; bottom: 0.85rem; }
  }

  /* Dark theme */
  body[data-theme="dark"] {
    --bg: #1A1916;
    --surface: #242220;
    --surface-2: #2E2B28;
    --border: #3A3630;
    --border-strong: #524E46;
    --text: #F0EBE0;
    --text-soft: #BFB8AB;
    --muted: #7A7468;
    --accent: #4A8A7A;
    --accent-soft: #1E3530;
    --accent-ink: #D9E4DC;
    --warn: #CC6B47;
    --warn-soft: #2E1E16;
    --positive: #5A9A72;
    --c1: #4A8A7A; --c2: #CC6B47; --c3: #C49A3F; --c4: #6B83A8; --c5: #8A6B9E; --c6: #A45D6E;
  }

  /* Sidebar controls */
  .sidebar-controls { display: flex; flex-direction: column; gap: 0.5rem; }
  .ctrl-full { width: 100%; }

  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-soft);
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.4rem 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    height: 32px;
    transition: all 0.15s;
    width: 100%;
    justify-content: flex-start;
  }
  .theme-toggle:hover { border-color: var(--border-strong); color: var(--text); }
</style>
</head>

      <button data-val="fraunces" style="font-family:'Fraunces',serif">Fraunces</button>

<script>
/* Tweaks */
const TWEAK_DEFAULTS = { palette: 'warm', density: 'cozy', brand: 'serif', summary: 'serif', 'ui-font': 'dmsans', 'accent-font': 'instrument' };
let tweaks = { ...TWEAK_DEFAULTS };

function applyTweaks() {
  document.body.dataset.palette = tweaks.palette;
  document.body.dataset.density = tweaks.density;
  document.body.dataset.brand = tweaks.brand;
  document.body.dataset.summary = tweaks.summary;
  document.body.dataset.uiFont = tweaks['ui-font'];
  document.body.dataset.accentFont = tweaks['accent-font'];
  document.querySelectorAll('.summary-text').forEach(el => {
    if (tweaks.summary === 'sans') {
      el.style.fontFamily = 'var(--sans)';
      el.style.fontStyle = 'normal';
      el.style.fontWeight = '500';
      el.style.fontSize = '1.05rem';
    } else {
      el.style.fontFamily = '';
      el.style.fontStyle = '';
      el.style.fontWeight = '';
      el.style.fontSize = '';
    }
  });
  for (const key of ['palette','density','brand','summary','ui-font','accent-font']) {
    document.querySelectorAll(`#tw-${key} button`).forEach(b => {
      b.classList.toggle('active', b.dataset.val === tweaks[key]);
    });
  }
}

function setTweak(k, v) {
  tweaks[k] = v;
  applyTweaks();
  try { window.parent.postMessage({type: '__edit_mode_set_keys', edits: { [k]: v }}, '*'); } catch(e){}
}

['palette','density','brand','summary','ui-font','accent-font'].forEach(key => {
  document.querySelectorAll(`#tw-${key} button`).forEach(b => {
    b.addEventListener('click', () => setTweak(key, b.dataset.val));
  });
});
applyTweaks();

window.addEventListener('message', (e) => {
  if (!e.data || typeof e.data !== 'object') return;
  if (e.data.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');
  else if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');
});

function closeTweaks() {
  document.getElementById('tweaks-panel').classList.remove('open');
  try { window.parent.postMessage({type: '__edit_mode_dismissed'}, '*'); } catch(e){}
}
try { window.parent.postMessage({type: '__edit_mode_available'}, '*'); } catch(e){}

/* Drawer / sidebar collapse */
function isMobile() { return window.innerWidth <= 900; }

function toggleDrawer(force) {
  if (isMobile()) {
    const open = typeof force === 'boolean' ? force : !document.body.classList.contains('drawer-open');
    document.body.classList.toggle('drawer-open', open);
  } else {
    const collapsed = typeof force === 'boolean' ? !force : !document.body.classList.contains('sidebar-collapsed');
    document.body.classList.toggle('sidebar-collapsed', collapsed);
    try { localStorage.setItem('sidebarCollapsed', collapsed ? '1' : '0'); } catch(e){}
  }
}

try {
  if (localStorage.getItem('sidebarCollapsed') === '1' && !isMobile()) {
    document.body.classList.add('sidebar-collapsed');
  }
} catch(e){}

document.querySelectorAll('.suggestion-btn').forEach(b => {
  b.addEventListener('click', () => { if (isMobile()) toggleDrawer(false); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.body.classList.contains('drawer-open')) toggleDrawer(false);
});

/* App logic */
let conversationHistory = [];

document.getElementById('dataset-select').addEventListener('change', () => {
  conversationHistory = [];
  loadSchema();
});

function resetHistory() {
  conversationHistory = [];
  document.getElementById('results').innerHTML = '';
  showEmptyState('Conversazione azzerata.', 'Fai una nuova domanda per ricominciare.');
}

function showEmptyState(headline, sub) {
  const el = document.createElement('div');
  el.className = 'empty-state';
  el.innerHTML = `
    <div class="figure">€</div>
    <h3>${headline || 'I tuoi numeri, in lingua naturale.'}</h3>
    <p>${sub || 'Chiedi qualsiasi cosa al tuo CSV — totali, trend, anomalie, confronti tra anni o categorie.'}</p>
  `;
  document.getElementById('results').appendChild(el);
}

/* Schema */
function loadSchema() {
  const dataset = document.getElementById('dataset-select').value;
  fetch('/api/schema?dataset=' + dataset)
    .then(r => r.json())
    .then(schema => {
      const rowCount = schema.totalRows ?? schema.count ?? 0;
      const yrs = schema.years || [];
      const period = yrs.length ? `${yrs[0]}–${yrs.at(-1)}` : '—';
      document.getElementById('schema-total').textContent = rowCount.toLocaleString('it-IT');
      document.getElementById('schema-period').textContent = period;
      document.getElementById('schema-cats').textContent = schema.categories.length;
    });
}

/* API status */
function checkApiStatus() {
  fetch('/api/schema?dataset=BIKE')
    .then(r => {
      const ok = r.ok;
      document.getElementById('api-dot').style.background = ok ? 'var(--positive)' : 'var(--warn)';
      document.getElementById('api-label').textContent = ok ? 'online' : 'offline';
    })
    .catch(() => {
      document.getElementById('api-dot').style.background = 'var(--warn)';
      document.getElementById('api-label').textContent = 'offline';
    });
}

/* Version */
fetch('/api/version')

/* Theme */
function toggleTheme() {
  const isDark = document.body.dataset.theme === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.body.dataset.theme = next === 'light' ? '' : 'dark';
  updateThemeToggle(next);
  try { localStorage.setItem('theme', next); } catch(e){}
}

function updateThemeToggle(theme) {
  const isDark = theme === 'dark';
  document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀';
  document.getElementById('theme-label').textContent = isDark ? 'Scuro' : 'Chiaro';
}

try {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') {
    document.body.dataset.theme = 'dark';
    document.getElementById('theme-icon').textContent = '🌙';
    document.getElementById('theme-label').textContent = 'Scuro';
  }
} catch(e){}

loadSchema();
checkApiStatus();
setInterval(checkApiStatus, 30000);
showEmptyState();

/* Submit */
document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitQuestion(); }
});

function ask(text) {
  document.getElementById('question').value = text;
  submitQuestion();
}

async function submitQuestion() {
  const input = document.getElementById('question');
  const q = input.value.trim();
  if (!q) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  input.value = '';

  const results = document.getElementById('results');
  results.querySelectorAll('.empty-state').forEach(el => el.remove());

  if (conversationHistory.length === 0) {
    results.querySelectorAll('.response-card, .error-card').forEach(el => el.remove());
  }

  const loadingEl = document.createElement('div');
  loadingEl.className = 'loading-card';
  loadingEl.innerHTML = `
    <div class="spinner"></div>
    <div class="loading-text">Sto leggendo i tuoi dati<span class="dots"></span></div>
  `;
  results.prepend(loadingEl);

  const windowSize = parseInt(document.getElementById('window-select').value);
  const history = conversationHistory.slice(-windowSize);

  try {
    const r = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: q,
        model: document.getElementById('model-select').value,
        dataset: document.getElementById('dataset-select').value,
        history
      })
    });
    if (!r.ok) throw new Error('API ' + r.status);
    const data = await r.json();
    loadingEl.remove();
    conversationHistory.push(
      { role: 'user', content: q },
      { role: 'assistant', content: data.summary ?? '' }
    );
    results.prepend(buildCard(q, data));
  } catch (err) {
    loadingEl.remove();
    const errEl = document.createElement('div');
    errEl.className = 'error-card';
    errEl.textContent = `Errore: ${err.message}`;
    results.prepend(errEl);
  } finally {
    btn.disabled = false;
  }
}

/* Card builder */
function buildCard(question, data) {
  const card = document.createElement('div');
  card.className = 'response-card';

  const ts = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  const hasInsights = data.insights?.length > 0;
  const hasWarnings = data.warnings?.length > 0;
  const chart = data.chart;
  const hasRaw = data.raw_data && Object.keys(data.raw_data).length > 0;

  const insightsHTML = hasInsights ? `
    <div>
      <div class="section-label">Cosa risalta</div>
      <ul class="insights-list">
        ${data.insights.map(i => `<li>${renderMarkdown(i)}</li>`).join('')}
      </ul>
    </div>` : '';

  const warningsHTML = hasWarnings ? `
    <div>
      <div class="section-label">Da tenere d'occhio</div>
      <ul class="insights-list warnings-list">
        ${data.warnings.map(w => `<li>${renderMarkdown(w)}</li>`).join('')}
      </ul>
    </div>` : '';

  const rawId = 'raw-' + Math.random().toString(36).slice(2, 9);
  const rawHTML = hasRaw ? `
    <div>
      <button class="toggle-raw" onclick="toggleRaw('${rawId}')">mostra dati grezzi</button>
      <pre class="raw-data" id="${rawId}" style="display:none">${JSON.stringify(data.raw_data, null, 2)}</pre>
    </div>` : '';

  const canvasId = 'chart-' + Math.random().toString(36).slice(2, 9);
  const chartHTML = chart ? `
    <div class="chart-wrap">
      <div class="chart-head">
        <div class="section-label" style="margin:0">${chart.title || 'Grafico'}</div>
        <button class="save-png-btn" data-canvas="${canvasId}">↓ PNG</button>
      </div>
      <canvas id="${canvasId}"></canvas>
    </div>` : '';

  card.innerHTML = `
    <div class="question-row">
      <span class="q">${escapeHtml(question)}</span>
      <span class="ts">${ts}</span>
    </div>
    <div class="response-body">
      <div class="summary-text">${renderMarkdown(data.summary || '—')}</div>
      ${insightsHTML}
      ${warningsHTML}
      ${chartHTML}
      ${rawHTML}
    </div>
  `;

  if (chart) {
    setTimeout(() => renderChart(card.querySelector('#' + canvasId), chart), 0);
    card.querySelector('[data-canvas="' + canvasId + '"]').addEventListener('click', () => {
      const canvas = card.querySelector('#' + canvasId);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = (chart.title || 'chart') + '.png';
      a.click();
    });
  }

  applyTweaks();
  return card;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function renderMarkdown(text) {
  if (!text) return '';
  let s = escapeHtml(text);
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  const lines = s.split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    if (/^- /.test(line)) {
      if (!inList) { out.push('<ul class="md-list">'); inList = true; }
      out.push('<li>' + line.slice(2) + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push(line);
    }
  }
  if (inList) out.push('</ul>');
  return out.join('\n');
}

function toggleRaw(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  if (el.style.display === 'none') {
    el.style.display = 'block';
    btn.textContent = 'nascondi dati grezzi';
  } else {
    el.style.display = 'none';
    btn.textContent = 'mostra dati grezzi';
  }
}

/* Chart rendering */
function getChartColors() {
  const cs = getComputedStyle(document.body);
  return {
    c1: cs.getPropertyValue('--c1').trim(),
    c2: cs.getPropertyValue('--c2').trim(),
    c3: cs.getPropertyValue('--c3').trim(),
    c4: cs.getPropertyValue('--c4').trim(),
    c5: cs.getPropertyValue('--c5').trim(),
    c6: cs.getPropertyValue('--c6').trim(),
    accent: cs.getPropertyValue('--accent').trim(),
    text: cs.getPropertyValue('--text').trim(),
    muted: cs.getPropertyValue('--muted').trim(),
    border: cs.getPropertyValue('--border').trim(),
  };
}

function renderChart(canvas, chartData) {
  const { type, title, labels, values } = chartData;
  const C = getChartColors();
  const palette = [C.c1, C.c2, C.c3, C.c4, C.c5, C.c6, '#7A8A6E'];
  const isCircular = type === 'pie' || type === 'doughnut';

  const dataset = {
    label: title,
    data: values,
    borderWidth: 2,
    pointRadius: type === 'line' ? 3 : 0,
    pointHoverRadius: 5,
    tension: 0.35,
    fill: type === 'line',
  };

  if (isCircular) {
    dataset.backgroundColor = palette.slice(0, values.length);
    dataset.borderColor = '#FFFFFF';
    dataset.hoverOffset = 6;
  } else if (type === 'bar') {
    dataset.backgroundColor = C.accent;
    dataset.borderColor = C.accent;
    dataset.borderRadius = 6;
    dataset.barPercentage = 0.7;
    dataset.categoryPercentage = 0.7;
  } else {
    dataset.backgroundColor = C.accent + '22';
    dataset.borderColor = C.accent;
    dataset.pointBackgroundColor = C.accent;
    dataset.pointBorderColor = '#FFFFFF';
    dataset.pointBorderWidth = 2;
  }

  new Chart(canvas, {
    type: type === 'doughnut' ? 'doughnut' : type,
    data: { labels, datasets: [dataset] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: type === 'doughnut' ? '62%' : undefined,
      plugins: {
        legend: {
          display: isCircular,
          position: window.innerWidth <= 640 ? 'bottom' : 'right',
          labels: {
            color: C.text,
            font: { family: "'DM Sans', sans-serif", size: 12 },
            boxWidth: 10, boxHeight: 10, padding: 12,
            usePointStyle: true, pointStyle: 'circle'
          }
        },
        title: { display: false },
        tooltip: {
          backgroundColor: C.text,
          titleFont: { family: "'DM Sans', sans-serif", size: 12, weight: '600' },
          bodyFont: { family: "'JetBrains Mono', monospace", size: 12 },
          padding: 10,
          cornerRadius: 8,
          displayColors: false,
          callbacks: {
            label: (ctx) => ' € ' + (ctx.parsed.y ?? ctx.parsed).toLocaleString('it-IT')
          }
        }
      },
      scales: isCircular ? {} : {
        x: {
          ticks: { color: C.muted, font: { family: "'DM Sans', sans-serif", size: 11 } },
          grid: { display: false },
          border: { color: C.border }
        },
        y: {
          ticks: {
            color: C.muted,
            font: { family: "'JetBrains Mono', monospace", size: 11 },
            callback: (v) => '€' + v.toLocaleString('it-IT')
          },
          grid: { color: C.border, drawTicks: false },
          border: { display: false }
        }
      }
    }
  });
}
